<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | H Square Design</title>
  <style>
    :root{
      --bg:#ece7df;
      --panel:#f4efe8;
      --text:#171513;
      --muted:#6f675f;
      --soft-line:rgba(23,21,19,.10);
      --cream:#d7c2a5;
      --cream-text:#7c6347;
      --max:1440px;
      --serif: Georgia, "Times New Roman", serif;
      --sans: "Helvetica Neue", Arial, Helvetica, sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}
    a{text-decoration:none;color:inherit}
    img{display:block;width:100%}
    .container{width:min(var(--max), calc(100% - 56px));margin:0 auto}

    .site-header{
      position:fixed;top:0;left:0;right:0;z-index:1000;padding:24px 0;mix-blend-mode:difference;
    }
    .header-inner{display:flex;align-items:center;justify-content:space-between}
    .site-logo img{width:68px}
    .menu-toggle{width:82px;height:50px;position:relative;background:none;border:0;transform:translateX(28px)}
    .menu-toggle span{position:absolute;right:0;height:2px;background:#fff;border-radius:999px}
    .menu-toggle span:nth-child(1){top:12px;width:52px}
    .menu-toggle span:nth-child(2){top:24px;width:68px}
    .menu-toggle span:nth-child(3){top:36px;width:58px}

    .page-hero{padding:150px 0 60px}
    .eyebrow{
      display:inline-block;padding:10px 16px;border-radius:999px;background:var(--cream);color:var(--cream-text);
      text-transform:uppercase;letter-spacing:.14em;font-size:.76rem;font-weight:700;margin-bottom:22px;
    }
    h1,h2,h3
