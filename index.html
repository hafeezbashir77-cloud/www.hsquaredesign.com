<script>
  const menuToggle = document.getElementById('menuToggle');
  const megaMenu = document.getElementById('megaMenu');
  const menuClose = document.getElementById('menuClose');
  const submenuList = document.getElementById('submenuList');
  const detailList = document.getElementById('detailList');
  const megaBg = document.querySelector('.mega-bg');
  const mainButtons = document.querySelectorAll('.menu-item');
  const centerCol = document.getElementById('centerCol');
  const rightCol = document.getElementById('rightCol');
  const submenuPanel = document.getElementById('submenuPanel');
  const detailPanel = document.getElementById('detailPanel');
  const heroSection = document.getElementById('heroSection');
  const siteHeader = document.getElementById('siteHeader');

  const pageLinks = {
    'Apartments': 'portfolio.html',
    'Farm House': 'portfolio.html',
    'Villas': 'portfolio.html',
    'Commercial Interior': 'portfolio.html',
    'Feature Walls': 'portfolio.html',
    'Facade Concepts': 'portfolio.html',
    'School': 'portfolio.html',
    'Hospital': 'portfolio.html',
    'University': 'portfolio.html',

    'Calm Visual Direction': 'about.html',
    'Strong Presentation': 'about.html',
    'Detail Focus': 'about.html',
    'Clarity': 'about.html',
    'Restraint': 'about.html',
    'Identity': 'about.html',
    'Consultation': 'about.html',
    'Refinement': 'about.html',
    'Delivery': 'about.html',

    '0301-4463492': 'contact.html',
    '0300-4848909': 'contact.html',
    'hafeezbashir77@gmail.com': 'contact.html',
    '18km Main Sheikhupura Road': 'contact.html',
    'Lahore': 'contact.html'
  };

  const menuData = {
    services: {
      image: './commercial elevation design (1).jpeg',
      submenu: [
        'Architecture',
        'Interior Design',
        'Town Planning',
        'Landscaping',
        'Construction'
      ],
      details: {
        'Architecture': {
          title: 'Architecture',
          tagline: 'Residential • Commercial • Institutional',
          text: 'Thoughtful architectural design focused on planning, elevation development, facade composition, and spatial clarity. We develop architectural concepts for homes, apartments, commercial buildings, and institutional projects with stronger proportion, identity, and buildable direction.',
          gallery: [
            './Appartments/apartment elevation design (1).jpg',
            './farm house/farmhouse elevation design (1).jpg',
            './school/school elevation design (1).png'
          ]
        },
        'Interior Design': {
          title: 'Interior Design',
          tagline: 'Spaces with identity and atmosphere',
          text: 'Interior design solutions for offices, homes, and branded environments with attention to furniture zoning, ceiling composition, feature walls, finishes, and a refined visual character that feels professional and complete.',
          gallery: [
            './commercial elevation design (1).jpeg',
            './Feature Walls/feature wall elevation design (1).jpg',
            './commercial elevation design (1).jpeg'
          ]
        },
        'Town Planning': {
          title: 'Town Planning',
          tagline: 'Layout, movement, zoning, development',
          text: 'Town planning services shaped around site organization, movement systems, land use response, circulation logic, and structured development layouts for larger schemes that need clarity and long-term planning value.',
          gallery: [
            './school/school elevation design (1).png',
            './hospital/hospital elevation design (1).png',
            './farm house/farmhouse elevation design (1).jpg'
          ]
        },
        'Landscaping': {
          title: 'Landscaping',
          tagline: 'Outdoor balance and environmental expression',
          text: 'Landscape concepts that strengthen the atmosphere of a project through greenery, circulation, visual layering, and outdoor planning that supports architecture while giving the space a calmer and more premium experience.',
          gallery: [
            './farm house/farmhouse elevation design (1).jpg',
            './school/school elevation design (1).png',
            './commercial elevation design (1).jpeg'
          ]
        },
        'Construction': {
          title: 'Construction',
          tagline: 'From concept to built execution',
          text: 'Construction support and execution guidance with attention to coordination, detailing, build accuracy, and practical implementation so that the project stays aligned with the design vision from drawing stage to site delivery.',
          gallery: [
            './Feature Walls/feature wall elevation design (1).jpg',
            './Appartments/apartment elevation design (1).jpg',
            './commercial elevation design (1).jpeg'
          ]
        }
      }
    },

    portfolio: {
      image: './Appartments/apartment elevation design (1).jpg',
      submenu: ['Residential Projects', 'Commercial Projects', 'Institutional Projects'],
      details: {
        'Residential Projects': {
          image: './farm house/farmhouse elevation design (1).jpg',
          items: ['Apartments', 'Farm House', 'Villas']
        },
        'Commercial Projects': {
          image: './commercial elevation design (1).jpeg',
          items: ['Commercial Interior', 'Feature Walls', 'Facade Concepts']
        },
        'Institutional Projects': {
          image: './hospital/hospital elevation design (1).png',
          items: ['School', 'Hospital', 'University']
        }
      }
    },

    about: {
      image: './school/school elevation design (1).png',
      submenu: ['Studio Approach', 'Design Philosophy', 'Client Experience'],
      details: {
        'Studio Approach': {
          image: './Appartments/apartment elevation design (1).jpg',
          items: ['Calm Visual Direction', 'Strong Presentation', 'Detail Focus']
        },
        'Design Philosophy': {
          image: './Feature Walls/feature wall elevation design (1).jpg',
          items: ['Clarity', 'Restraint', 'Identity']
        },
        'Client Experience': {
          image: './commercial elevation design (1).jpeg',
          items: ['Consultation', 'Refinement', 'Delivery']
        }
      }
    },

    contact: {
      image: './hospital/hospital elevation design (1).png',
      submenu: ['Phone', 'Email', 'Location'],
      details: {
        'Phone': {
          image: './commercial elevation design (1).jpeg',
          items: ['0301-4463492', '0300-4848909']
        },
        'Email': {
          image: './Feature Walls/feature wall elevation design (1).jpg',
          items: ['hafeezbashir77@gmail.com']
        },
        'Location': {
          image: './school/school elevation design (1).png',
          items: ['18km Main Sheikhupura Road', 'Lahore']
        }
      }
    }
  };

  function updateMenuBackground(imagePath) {
    megaBg.style.background = `linear-gradient(rgba(0,0,0,.66), rgba(0,0,0,.78)), url('${imagePath}') center center / cover no-repeat`;
  }

  function resetMenuState() {
    mainButtons.forEach(btn => btn.classList.remove('active'));
    centerCol.classList.remove('show');
    rightCol.classList.remove('show');
    submenuPanel.classList.remove('show');
    detailPanel.classList.remove('show');
    submenuList.innerHTML = '';
    detailList.innerHTML = '';
    updateMenuBackground('./commercial elevation design (1).jpeg');
  }

  function openMenu() {
    megaMenu.classList.add('is-open');
    menuToggle.classList.add('is-active');
    document.body.style.overflow = 'hidden';
    heroSection.classList.add('hidden');
    siteHeader.classList.add('hidden');
    resetMenuState();
  }

  function closeMenu() {
    megaMenu.classList.remove('is-open');
    menuToggle.classList.remove('is-active');
    document.body.style.overflow = '';
    heroSection.classList.remove('hidden');
    siteHeader.classList.remove('hidden');
  }

  function renderDetails(mainKey, subKey) {
    const detailData = menuData[mainKey].details[subKey] || {};

    rightCol.classList.remove('show');
    detailPanel.classList.remove('show');

    if (mainKey === 'services') {
      const heroImage = detailData.gallery && detailData.gallery.length
        ? detailData.gallery[0]
        : menuData[mainKey].image;

      if (heroImage) {
        updateMenuBackground(heroImage);
      }
    } else if (detailData.image) {
      updateMenuBackground(detailData.image);
    }

    setTimeout(() => {
      if (mainKey === 'services') {
        const gallery = detailData.gallery || [];

        detailList.innerHTML = `
          <div class="service-detail-panel-full">
            <span class="detail-tag">Service</span>
            <h3>${detailData.title || subKey}</h3>
            <div class="service-detail-tagline">${detailData.tagline || ''}</div>
            <p>${detailData.text || ''}</p>
            <div class="service-gallery-grid">
              ${gallery.map((img, index) => `
                <div class="service-gallery-item ${index === 0 ? 'large' : ''}">
                  <img src="${img}" alt="${detailData.title || subKey}">
                </div>
              `).join('')}
            </div>
            <a class="detail-cta" href="services.html">Open Service Page</a>
          </div>
        `;
      } else {
        const items = detailData.items || [];

        detailList.innerHTML = items.map((item, index) => {
          const link = pageLinks[item] || '#';
          return `
            <button
              class="detail-item ${index === 0 ? 'active' : ''}"
              data-link="${link}">
              ${item}
            </button>
          `;
        }).join('');

        document.querySelectorAll('.detail-item').forEach(btn => {
          btn.addEventListener('click', () => {
            const link = btn.getAttribute('data-link');
            if (link && link !== '#') {
              window.location.href = link;
            }
          });
        });
      }

      rightCol.classList.add('show');

      setTimeout(() => {
        detailPanel.classList.add('show');
      }, 60);
    }, 90);
  }

  function renderSubmenu(mainKey) {
    const items = menuData[mainKey].submenu || [];

    centerCol.classList.remove('show');
    rightCol.classList.remove('show');
    submenuPanel.classList.remove('show');
    detailPanel.classList.remove('show');
    detailList.innerHTML = '';

    if (menuData[mainKey].image) {
      updateMenuBackground(menuData[mainKey].image);
    }

    setTimeout(() => {
      submenuList.innerHTML = items.map((item) => `
        <button class="submenu-item" data-sub="${item}">${item}</button>
      `).join('');

      centerCol.classList.add('show');

      setTimeout(() => {
        submenuPanel.classList.add('show');
      }, 60);

      document.querySelectorAll('.submenu-item').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.submenu-item').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderDetails(mainKey, btn.dataset.sub);
        });
      });

      if (mainKey === 'services' && items.length > 0) {
        const firstBtn = document.querySelector('.submenu-item');
        if (firstBtn) {
          firstBtn.classList.add('active');
          renderDetails(mainKey, items[0]);
        }
      }
    }, 90);
  }

  menuToggle.addEventListener('click', () => {
    if (megaMenu.classList.contains('is-open')) {
      closeMenu();
    } else {
      openMenu();
    }
  });

  menuClose.addEventListener('click', closeMenu);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeMenu();
  });

  mainButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      mainButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderSubmenu(btn.dataset.main);
    });
  });
</script>
